<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Volley LIVE - Girone C</title>
    <style>
        :root { --primary: #1e40af; --accent: #ef4444; --bg: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; color: #1e293b; }
        header { background: var(--primary); color: white; padding: 1rem; text-align: center; font-weight: bold; }
        .container { padding: 1rem; max-width: 900px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-top: 5px solid var(--primary); }
        .live-grid { display: grid; gap: 10px; }
        .match-row { display: flex; align-items: center; background: #f1f5f9; padding: 15px; border-radius: 8px; border-left: 4px solid #10b981; }
        .match-row .team { flex: 1; font-size: 0.9rem; font-weight: 700; }
        .match-row .score { background: #1e293b; color: white; padding: 8px 15px; border-radius: 6px; font-size: 1.5rem; font-weight: 900; margin: 0 15px; min-width: 60px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th { text-align: left; background: #f8fafc; padding: 12px; border-bottom: 2px solid #e2e8f0; color: #64748b; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .gps-row { background: #dbeafe !important; color: #1e40af; font-weight: bold; }
        .pulse { display: inline-block; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; margin-right: 5px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 1; } 70% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(0.95); opacity: 1; } }
    </style>
</head>
<body>

<header>
    🏐 SERIE B1F GIRONE C - LIVE
    <div id="last-update" style="font-size: 0.7rem; font-weight: normal; opacity: 0.8;"></div>
</header>

<div class="container">
    <div class="card">
        <h3><span class="pulse"></span> PARTITE LIVE</h3>
        <div id="live-box" class="live-grid">Caricamento in corso...</div>
    </div>

    <div class="card">
        <h3>🏆 CLASSIFICA PROIETTATA</h3>
        <div style="overflow-x: auto;">
            <table id="standings-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>SQUADRA</th>
                        <th>PT</th>
                        <th>V</th>
                        <th>SET V/P</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const INITIAL_STANDINGS = [
    { name:"AZIMUT GIORGIONE TV", pts:72, v:24, sv:74, sp:14 },
    { name:"BANCA ANNIA ADUNA PD", pts:65, v:23, sv:71, sp:18 },
    { name:"SMAPIU' ARENA VOLLEY VR", pts:56, v:19, sv:62, sp:25 },
    { name:"OROTIG AREA SPORT PESCHIERA VR", pts:42, v:12, sv:54, sp:44 },
    { name:"GPS VOLLEY GROUP SCHIO VI", pts:41, v:14, sv:51, sp:49 },
    { name:"PALLAVOLO PICCO LECCO LC", pts:36, v:11, sv:48, sp:46 },
    { name:"VOLKSBANK VICENZA VOLLEY VI", pts:35, v:12, sv:48, sp:48 },
    { name:"CORTINA EXPRESS IMOCO VE", pts:31, v:10, sv:40, sp:52 },
    { name:"ISUZU CEREA VR", pts:29, v:10, sv:39, sp:55 },
    { name:"PALLAV. DON FELICE COLLEONI BG", pts:29, v:10, sv:38, sp:54 },
    { name:"ROTHOBLAAS VOLANO TN", pts:28, v:9, sv:37, sp:58 },
    { name:"IDRAS TORBOLE CASAGLIA BS", pts:27, v:10, sv:39, sp:57 },
    { name:"BREMBO VOLLEY TEAM BG", pts:27, v:9, sv:32, sp:57 },
    { name:"PROMOBALL SANITARS BS", pts:7, v:2, sv:15, sp:71 }
];

async function fetchLive() {
    try {
        // Proviamo AllOrigins ma con un timestamp per evitare la cache del proxy
        const cacheBuster = new Date().getTime();
        const target = `https://www.federvolley.it/live-score-b1-femminile?t=${cacheBuster}`;
        const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}`);
        const data = await response.json();
        
        const parser = new DOMParser();
        const doc = parser.parseFromString(data.contents, 'text/html');
        
        // Cerchiamo tutte le tabelle. In Federvolley spesso i live sono in table con classe "m-live" o simili
        const tables = doc.querySelectorAll('table');
        let foundMatches = [];
        let inGironeC = false;

        tables.forEach(table => {
            const rows = table.querySelectorAll('tr');
            rows.forEach(row => {
                const rowText = row.innerText.toUpperCase();
                
                // Switch di sezione
                if (rowText.includes("GIRONE C")) { inGironeC = true; return; }
                if (rowText.includes("GIRONE D")) { inGironeC = false; return; }

                if (inGironeC) {
                    const cells = row.querySelectorAll('td');
                    // Una riga valida di solito ha: Squadra Casa | Punteggio | Squadra Fuori
                    if (cells.length >= 3) {
                        const h = cells[0].innerText.trim();
                        const s = cells[1].innerText.trim();
                        const a = cells[2].innerText.trim();

                        if (s.includes("-") && h.length > 2) {
                            const [s1, s2] = s.split("-").map(n => parseInt(n.trim()));
                            if (!isNaN(s1)) {
                                foundMatches.push({ home: h, away: a, s1, s2 });
                            }
                        }
                    }
                }
            });
        });

        updateUI(foundMatches);

    } catch (e) {
        console.error("Errore critico:", e);
        updateUI([]); // Fallback
    }
}

function updateUI(matches) {
    const liveBox = document.getElementById('live-box');
    const tableBody = document.getElementById('table-body');
    const standings = JSON.parse(JSON.stringify(INITIAL_STANDINGS));

    // 1. Processa Match Live
    if (matches.length === 0) {
        liveBox.innerHTML = "<p style='color:gray; font-style:italic;'>Nessun match live trovato nel Girone C. Se sei sicuro che ci siano partite, il sito FIPAV potrebbe star bloccando l'accesso automatico.</p>";
    } else {
        liveBox.innerHTML = "";
        matches.forEach(m => {
            // UI Match
            const div = document.createElement('div');
            div.className = 'match-row';
            div.innerHTML = `
                <div class="team" style="text-align:right">${m.home}</div>
                <div class="score">${m.s1} - ${m.s2}</div>
                <div class="team">${m.away}</div>
            `;
            liveBox.appendChild(div);

            // Calcolo punti per classifica (Normalizzazione nomi)
            const findTeam = (name) => standings.find(t => 
                name.toUpperCase().replace(/\s/g, '').includes(t.name.substring(0,8).replace(/\s/g, ''))
            );
            
            const t1 = findTeam(m.home);
            const t2 = findTeam(m.away);

            if (t1 && t2) {
                t1.sv += m.s1; t1.sp += m.s2;
                t2.sv += m.s2; t2.sp += m.s1;
                // Calcolo Punti Live
                if (m.s1 === 3 && m.s2 <= 1) { t1.pts += 3; t1.v += 1; }
                else if (m.s2 === 3 && m.s1 <= 1) { t2.pts += 3; t2.v += 1; }
                else if (m.s1 === 3 && m.s2 === 2) { t1.pts += 2; t1.v += 1; t2.pts += 1; }
                else if (m.s2 === 3 && m.s1 === 2) { t2.pts += 2; t2.v += 1; t1.pts += 1; }
            }
        });
    }

    // 2. Ordina e renderizza Classifica
    standings.sort((a,b) => b.pts - a.pts || b.v - a.v || (b.sv/b.sp) - (a.sv/a.sp));
    
    tableBody.innerHTML = standings.map((t, i) => `
        <tr class="${t.name.includes("GPS") ? 'gps-row' : ''}">
            <td>${i+1}</td>
            <td>${t.name}</td>
            <td><b>${t.pts}</b></td>
            <td>${t.v}</td>
            <td>${t.sv}/${t.sp}</td>
        </tr>
    `).join('');

    document.getElementById('last-update').innerText = "Ultimo check: " + new Date().toLocaleTimeString();
}

// Start
fetchLive();
setInterval(fetchLive, 30000); // Check ogni 30 secondi
</script>

</body>
</html>
