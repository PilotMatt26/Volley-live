<!DOCTYPE html>
<html lang='it'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>GPS Volley Group - LIVE Dashboard</title>
    <style>
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f3f4f6;margin:0}
        header{background:#111827;color:white;padding:18px;text-align:center}
        .container{padding:16px}
        .card{background:white;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
        .big{font-size:42px;font-weight:bold}
        .green{background:#d1fae5}
        .red{background:#fee2e2}
        table{width:100%;border-collapse:collapse; font-size: 14px;}
        th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left}
        th{background: #f9fafb; color: #374151; font-weight: 600;}
        .highlight{background:#dbeafe;font-weight:bold}
        .small{font-size:14px;color:#666}
        .badge-win { color: #059669; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>🏐 Serie B1 Femminile - Girone C</h1>
    <div>Dashboard Live Score & Classifica FIPAV</div>
</header>

<div class='container'>
    <div class='card green' id='gpsCard'>
        <div class='small'>Stato Live GPS Volley Group</div>
        <div class='big' id='gpsPos'>--</div>
        <div id='update' class="small">In attesa di dati...</div>
    </div>

    <div class='card'>
        <h2>Classifica Real-Time</h2>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Squadra</th>
                    <th>Punti</th>
                    <th>V</th> <!-- Fondamentale per regolamento -->
                    <th>SV</th>
                    <th>SP</th>
                    <th>PF</th>
                    <th>PS</th>
                </tr>
            </thead>
            <tbody id='tbody'></tbody>
        </table>
    </div>
</div>

<script>
// 1. Array aggiornato con dati PV estratti da "Immagine 2026-05-09 180354.png"
let standings = [
    { team: "AZIMUT GIORGIONE TV", pts: 72, pv: 24, sv: 74, sp: 14, pf: 2134, ps: 1708 },
    { team: "BANCA ANNIA ADUNA PD", pts: 65, pv: 23, sv: 71, sp: 18, pf: 2110, ps: 1741 },
    { team: "SMAPIU' ARENA VOLLEY VR", pts: 56, pv: 19, sv: 62, sp: 25, pf: 2046, ps: 1703 },
    { team: "OROTIG AREA SPORT PESCHIERA VR", pts: 42, pv: 12, sv: 54, sp: 44, pf: 2138, ps: 2070 },
    { team: "GPS VOLLEY GROUP SCHIO VI", pts: 41, pv: 14, sv: 51, sp: 49, pf: 2159, ps: 2189 },
    { team: "PALLAVOLO PICCO LECCO LC", pts: 36, pv: 11, sv: 48, sp: 46, pf: 2082, ps: 2068 },
    { team: "VOLKSBANK VICENZA VOLLEY VI", pts: 35, pv: 12, sv: 48, sp: 48, pf: 2139, ps: 2017 },
    { team: "CORTINA EXPRESS IMOCO VE", pts: 31, pv: 10, sv: 40, sp: 52, pf: 1927, ps: 2067 },
    { team: "ISUZU CEREA VR", pts: 29, pv: 10, sv: 39, sp: 55, pf: 2003, ps: 2134 },
    { team: "PALLAV. DON FELICE COLLEONI BG", pts: 29, pv: 10, sv: 38, sp: 54, pf: 1943, ps: 2073 },
    { team: "ROTHOBLAAS VOLANO TN", pts: 28, pv: 9, sv: 37, sp: 58, pf: 2016, ps: 2208 },
    { team: "IDRAS TORBOLE CASAGLIA BS", pts: 27, pv: 10, sv: 39, sp: 57, pf: 1996, ps: 2150 },
    { team: "BREMBO VOLLEY TEAM BG", pts: 27, pv: 9, sv: 32, sp: 57, pf: 1902, ps: 2059 },
    { team: "PROMOBALL SANITARS BS", pts: 7, pv: 2, sv: 15, sp: 71, pf: 1685, ps: 2093 }
];

// FUNZIONE DI SUPPORTO: Calcola punti in base ai set vinti/persi
function getPointsFromMatch(vinti, persi) {
    if (vinti === 3 && persi < 2) return 3;
    if (vinti === 3 && persi === 2) return 2;
    if (vinti === 2 && persi === 3) return 1;
    return 0;
}

function render(){
    // 2. LOGICA DI ORDINAMENTO FIPAV (Punti > Vittorie > Quoziente Set > Quoziente Punti)
    standings.sort((a, b) => {
        if (b.pts !== a.pts) return b.pts - a.pts; // Priorità 1: Punti
        if (b.pv !== a.pv) return b.pv - a.pv;     // Priorità 2: Numero Vittorie
        
        // Priorità 3: Quoziente Set (sv/sp)
        let qsa = a.sp === 0 ? a.sv : a.sv / a.sp;
        let qsb = b.sp === 0 ? b.sv : b.sv / b.sp;
        if (qsb !== qsa) return qsb - qsa;
        
        // Priorità 4: Quoziente Punti (pf/ps)
        let qpa = a.ps === 0 ? a.pf : a.pf / a.ps;
        let qpb = b.ps === 0 ? b.pf : b.pf / b.ps;
        return qpb - qpa;
    });

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    standings.forEach((t, i) => {
        const tr = document.createElement("tr");
        if(t.team.includes("GPS")) tr.classList.add("highlight");

        tr.innerHTML = `
            <td>${i+1}</td>
            <td>${t.team}</td>
            <td style="font-weight:bold">${t.pts}</td>
            <td class="badge-win">${t.pv}</td>
            <td>${t.sv}</td>
            <td>${t.sp}</td>
            <td>${t.pf}</td>
            <td>${t.ps}</td>
        `;
        tbody.appendChild(tr);

        // Aggiornamento Box GPS
        if(t.team.includes("GPS")){
            const pos = i+1;
            const card = document.getElementById("gpsCard");
            
            // Logica colore dinamico: verde se top 4, rosso se a rischio (esempio)
            card.className = (pos <= 5) ? 'card green' : 'card red';
            document.getElementById("gpsPos").innerHTML = pos + "ª";
        }
    });

    document.getElementById("update").innerHTML = "Ultimo aggiornamento: " + new Date().toLocaleTimeString("it-IT");
}

async function updateLive(){
    try {
        const proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://www.federvolley.it/live-score-b1-femminile");
        const response = await fetch(proxy);
        const html = await response.text();

        // QUI DOVRAI INSERIRE LA LOGICA DI SCRAPING
        // Esempio logico:
        // 1. Trova nel testo 'html' i risultati della giornata
        // 2. Se un match è finito, aggiorna l'array:
        //    let gps = standings.find(s => s.team.includes("GPS"));
        //    gps.pts += getPointsFromMatch(3, 1); // Esempio vittoria da 3 punti
        //    gps.pv += 1;
        //    gps.sv += 3; gps.sp += 1;

        render();
    } catch(e) {
        console.error("Errore fetch live:", e);
        render(); // Renderizza comunque i dati statici se il live fallisce
    }
}

// Inizializzazione
render();
updateLive();
setInterval(updateLive, 60000); // Aggiorna ogni minuto

</script>
</body>
</html>
