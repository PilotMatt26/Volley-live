<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Volley LIVE - Girone C</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f4f7f6; margin: 0; color: #333; }
        header { background: #1a365d; color: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .container { padding: 15px; max-width: 900px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid #2b6cb0; }
        .live-match { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .team { flex: 1; font-weight: bold; font-size: 14px; }
        .score-box { background: #edf2f7; padding: 10px 20px; border-radius: 8px; font-size: 24px; font-weight: 800; color: #2d3748; min-width: 80px; text-align: center; margin: 0 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; background: #f8fafc; border-bottom: 2px solid #e2e8f0; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #edf2f7; font-size: 14px; }
        .gps-row { background: #ebf8ff !important; font-weight: bold; color: #2b6cb0; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-live { background: #fed7d7; color: #c53030; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<header>
    <h1>Dashboard Serie B1F - Girone C</h1>
    <div id="status">Connessione al server FIPAV...</div>
</header>

<div class="container">
    <div class="card">
        <h3><span class="badge badge-live">LIVE</span> Partite in Tempo Reale</h3>
        <div id="liveMatches">Tentativo di recupero dati in corso...</div>
    </div>

    <div class="card">
        <h3>🏆 Classifica Proiettata</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Squadra</th>
                        <th>PT</th>
                        <th>V</th>
                        <th>SV</th>
                        <th>SP</th>
                    </tr>
                </thead>
                <tbody id="standingsTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// Classifica Ufficiale Consolidata
const initialData = [
    { team:"AZIMUT GIORGIONE TV", pts:72, pv:24, sv:74, sp:14 },
    { team:"BANCA ANNIA ADUNA PD", pts:65, pv:23, sv:71, sp:18 },
    { team:"SMAPIU' ARENA VOLLEY VR", pts:56, pv:19, sv:62, sp:25 },
    { team:"OROTIG AREA SPORT PESCHIERA VR", pts:42, pv:12, sv:54, sp:44 },
    { team:"GPS VOLLEY GROUP SCHIO VI", pts:41, pv:14, sv:51, sp:49 },
    { team:"PALLAVOLO PICCO LECCO LC", pts:36, pv:11, sv:48, sp:46 },
    { team:"VOLKSBANK VICENZA VOLLEY VI", pts:35, pv:12, sv:48, sp:48 },
    { team:"CORTINA EXPRESS IMOCO VE", pts:31, pv:10, sv:40, sp:52 },
    { team:"ISUZU CEREA VR", pts:29, pv:10, sv:39, sp:55 },
    { team:"PALLAV. DON FELICE COLLEONI BG", pts:29, pv:10, sv:38, sp:54 },
    { team:"ROTHOBLAAS VOLANO TN", pts:28, pv:9, sv:37, sp:58 },
    { team:"IDRAS TORBOLE CASAGLIA BS", pts:27, pv:10, sv:39, sp:57 },
    { team:"BREMBO VOLLEY TEAM BG", pts:27, pv:9, sv:32, sp:57 },
    { team:"PROMOBALL SANITARS BS", pts:7, pv:2, sv:15, sp:71 }
];

let liveData = [];

async function updateDashboard() {
    try {
        // Proviamo a recuperare i dati usando un servizio proxy alternativo (Corsproxy.io)
        const targetUrl = "https://www.federvolley.it/live-score-b1-femminile";
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(targetUrl);
        
        const response = await fetch(proxyUrl);
        if (!response.ok) throw new Error("Server non raggiungibile");
        
        const html = await response.text();
        parseFipavData(html);

    } catch (error) {
        console.error("Errore Fetch:", error);
        document.getElementById("status").innerHTML = "⚠️ Modalità Offline (Dati Storici)";
        // In caso di errore, mostriamo la classifica base senza match live
        render(initialData, []);
    }
}

function parseFipavData(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    
    // Cerchiamo la sezione del Girone C (solitamente identificata da un'intestazione o una tabella specifica)
    // Dato che il DOM di Federvolley è complesso, cerchiamo tutte le righe delle tabelle
    const rows = doc.querySelectorAll('tr');
    let currentMatches = [];
    let isGironeC = false;

    rows.forEach(row => {
        const text = row.textContent.toUpperCase();
        if (text.includes("GIRONE C")) isGironeC = true;
        if (text.includes("GIRONE D")) isGironeC = false;

        if (isGironeC) {
            const cells = row.querySelectorAll('td');
            if (cells.length >= 3) {
                const home = cells[0].textContent.trim();
                const score = cells[1].textContent.trim();
                const away = cells[2].textContent.trim();

                if (score.includes("-") && home.length > 3) {
                    const parts = score.split("-");
                    currentMatches.push({
                        home: home,
                        away: away,
                        s1: parseInt(parts[0]),
                        s2: parseInt(parts[1])
                    });
                }
            }
        }
    });

    calculateLiveClassifica(currentMatches);
}

function calculateLiveClassifica(matches) {
    let newStandings = JSON.parse(JSON.stringify(initialData));

    matches.forEach(m => {
        const t1 = newStandings.find(s => m.home.includes(s.team.substring(0, 10)));
        const t2 = newStandings.find(s => m.away.includes(s.team.substring(0, 10)));

        if (t1 && t2) {
            t1.sv += m.s1; t1.sp += m.s2;
            t2.sv += m.s2; t2.sp += m.s1;

            if (m.s1 === 3 && m.s2 <= 1) { t1.pts += 3; t1.pv += 1; }
            else if (m.s2 === 3 && m.s1 <= 1) { t2.pts += 3; t2.pv += 1; }
            else if (m.s1 === 3 && m.s2 === 2) { t1.pts += 2; t1.pv += 1; t2.pts += 1; }
            else if (m.s2 === 3 && m.s1 === 2) { t2.pts += 2; t2.pv += 1; t1.pts += 1; }
        }
    });

    render(newStandings, matches);
}

function render(standings, matches) {
    // Ordinamento
    standings.sort((a, b) => (b.pts - a.pts) || (b.pv - a.pv) || (b.sv/b.sp - a.sv/a.sp));

    // Render Match
    const matchContainer = document.getElementById("liveMatches");
    if (matches.length === 0) {
        matchContainer.innerHTML = "<p style='color:#666'>Nessuna partita in diretta rilevata al momento.</p>";
    } else {
        matchContainer.innerHTML = matches.map(m => `
            <div class="live-match">
                <div class="team" style="text-align:right">${m.home}</div>
                <div class="score-box">${m.s1} - ${m.s2}</div>
                <div class="team">${m.away}</div>
            </div>
        `).join('');
    }

    // Render Tabella
    const tableBody = document.getElementById("standingsTable");
    tableBody.innerHTML = standings.map((t, i) => `
        <tr class="${t.team.includes("GPS") ? 'gps-row' : ''}">
            <td>${i+1}</td>
            <td>${t.team}</td>
            <td><b>${t.pts}</b></td>
            <td>${t.pv}</td>
            <td>${t.sv}</td>
            <td>${t.sp}</td>
        </tr>
    `).join('');

    document.getElementById("status").innerHTML = "✅ Dati aggiornati alle " + new Date().toLocaleTimeString();
}

// Esegui
updateDashboard();
setInterval(updateDashboard, 60000);
</script>

</body>
</html>
