<!DOCTYPE html>
<html lang='it'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>GPS Volley Group - LIVE</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f3f4f6;margin:0}
header{background:#111827;color:white;padding:18px;text-align:center}
.container{padding:16px}
.card{background:white;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.big{font-size:42px;font-weight:bold}
.green{background:#d1fae5}
.red{background:#fee2e2}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left}
.highlight{background:#dbeafe;font-weight:bold}
.small{font-size:14px;color:#666}
</style>
</head>
<body>

<header>
<h1>🏐 Serie B1 Femminile - Girone C</h1>
<div>Dashboard LIVE GPS Volley Group</div>
</header>

<div class='container'>

<div class='card green' id='gpsCard'>
<div class='small'>Posizione GPS Volley Group</div>
<div class='big' id='gpsPos'>4ª</div>
<div id='update'></div>
</div>

<div class='card'>
<h2>Classifica LIVE</h2>

<table>
<thead>
<tr>
<th>#</th>
<th>Squadra</th>
<th>Punti</th>
</tr>
</thead>
<tbody id='tbody'></tbody>
</table>

</div>
</div>

<script>

let standings = [
{team:"VolleyRò",pts:58},
{team:"Blu Volley",pts:57},
{team:"Sporting Club",pts:55},
{team:"GPS Volley Group",pts:54},
{team:"Volley Team",pts:53},
{team:"Roma Volley",pts:50},
{team:"Team 7",pts:47},
{team:"Team 8",pts:45},
{team:"Team 9",pts:40},
{team:"Team 10",pts:36},
{team:"Team 11",pts:31},
{team:"Team 12",pts:28},
{team:"Team 13",pts:20},
{team:"Team 14",pts:10}
];

function render(){

standings.sort((a,b)=>b.pts-a.pts);

const tbody = document.getElementById("tbody");
tbody.innerHTML = "";

standings.forEach((t,i)=>{

const tr = document.createElement("tr");

if(t.team.includes("GPS")){
tr.classList.add("highlight");
}

tr.innerHTML = `
<td>${i+1}</td>
<td>${t.team}</td>
<td>${t.pts}</td>
`;

tbody.appendChild(tr);

if(t.team.includes("GPS")){

const pos = i+1;

document.getElementById("gpsPos").innerHTML =
(pos===4 ? "🟢 4ª" :
 pos===5 ? "🔴 5ª" :
 pos+"ª");

}
});

document.getElementById("update").innerHTML =
"Ultimo aggiornamento: " +
new Date().toLocaleTimeString("it-IT");

}

async function updateLive(){

try{

const proxy =
"https://api.allorigins.win/raw?url=" +
encodeURIComponent("https://www.federvolley.it/live-score-b1-femminile");

await fetch(proxy);

render();

}catch(e){

render();

}

}

render();
updateLive();
setInterval(updateLive,60000);

</script>

</body>
</html>
