<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>GPS VOLLEY LIVE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding: 10px; color: #1a202c; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #2d3748; font-size: 1.2rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
        .match { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #edf2f7; border-radius: 8px; margin-bottom: 8px; }
        .team { width: 40%; font-weight: bold; font-size: 0.9rem; }
        .score { width: 20%; text-align: center; font-size: 1.4rem; font-weight: 800; color: #e53e3e; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 10px; background: #f7fafc; }
        td { padding: 10px; border-top: 1px solid #edf2f7; text-align: center; }
        .gps { background: #ebf8ff; font-weight: bold; }
        #debug { font-size: 0.7rem; color: #718096; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="live-title">🏐 Partite Live Girone C</h2>
    <div id="live-container">Caricamento risultati...</div>
    <div id="debug">Inizializzazione...</div>
</div>

<div class="card">
    <h2>🏆 Classifica Live</h2>
    <table>
        <thead>
            <tr><th>#</th><th style="text-align:left">Squadra</th><th>PT</th><th>V</th><th>SET</th></tr>
        </thead>
        <tbody id="standings-body"></tbody>
    </table>
</div>

<script>
const BASE_DATA = [
    { name:"AZIMUT GIORGIONE TV", pts:72, v:24, sv:74, sp:14 },
    { name:"BANCA ANNIA ADUNA PD", pts:65, v:23, sv:71, sp:18 },
    { name:"SMAPIU' ARENA VOLLEY VR", pts:56, v:19, sv:62, sp:25 },
    { name:"OROTIG AREA SPORT PESCHIERA VR", pts:42, v:12, sv:54, sp:44 },
    { name:"GPS VOLLEY GROUP SCHIO VI", pts:41, v:14, sv:51, sp:49 },
    { name:"PALLAVOLO PICCO LECCO LC", pts:36, v:11, sv:48, sp:46 },
    { name:"VOLKSBANK VICENZA VOLLEY VI", pts:35, v:12, sv:48, sp:48 },
    { name:"CORTINA EXPRESS IMOCO VE", pts:31, v:10, sv:40, sp:52 },
    { name:"ISUZU CEREA VR", pts:29, v:10, sv:39, sp:55 },
    { name:"PALLAV. DON FELICE COLLEONI BG", pts:29, v:10, sv:38, sp:54 },
    { name:"ROTHOBLAAS VOLANO TN", pts:28, v:9, sv:37, sp:58 },
    { name:"IDRAS TORBOLE CASAGLIA BS", pts:27, v:10, sv:39, sp:57 },
    { name:"BREMBO VOLLEY TEAM BG", pts:27, v:9, sv:32, sp:57 },
    { name:"PROMOBALL SANITARS BS", pts:7, v:2, sv:15, sp:71 }
];

async function update() {
    const debug = document.getElementById('debug');
    const liveBox = document.getElementById('live-container');
    
    try {
        debug.innerText = "Connessione al server FIPAV via CORSProxy...";
        
        // Usiamo corsproxy.io che è più leggero e non usa il protocollo QUIC che ti dava errore
        const url = "https://www.federvolley.it/live-score-b1-femminile";
        const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
        
        if (!response.ok) throw new Error("Timeout o errore server");
        
        const html = await response.text();
        debug.innerText = "Dati ricevuti, analisi Girone C...";

        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const rows = doc.querySelectorAll('tr');
        
        let matches = [];
        let isC = false;

        rows.forEach(r => {
            const txt = r.innerText.toUpperCase();
            if (txt.includes("GIRONE C")) isC = true;
            if (txt.includes("GIRONE D")) isC = false;

            if (isC) {
                const tds = r.querySelectorAll('td');
                if (tds.length >= 3) {
                    const h = tds[0].innerText.trim();
                    const s = tds[1].innerText.trim();
                    const a = tds[2].innerText.trim();
                    if (s.includes("-") && h.length > 3) {
                        const pts = s.split("-").map(n => parseInt(n));
                        if (!isNaN(pts[0])) matches.push({ h, a, s1:pts[0], s2:pts[1] });
                    }
                }
            }
        });

        render(matches);
        debug.innerText = "Aggiornato: " + new Date().toLocaleTimeString();

    } catch (e) {
        debug.innerText = "Errore: " + e.message + ". Riprovo tra 30 secondi.";
        render([]); // Mostra classifica base
    }
}

function render(matches) {
    const liveBox = document.getElementById('live-container');
    const standings = JSON.parse(JSON.stringify(BASE_DATA));

    if (matches.length === 0) {
        liveBox.innerHTML = "<p style='text-align:center; color:#a0aec0;'>Nessun match live trovato nel girone.</p>";
    } else {
        liveBox.innerHTML = "";
        matches.forEach(m => {
            liveBox.innerHTML += `
                <div class="match">
                    <div class="team" style="text-align:right">${m.h}</div>
                    <div class="score">${m.s1}-${m.s2}</div>
                    <div class="team">${m.a}</div>
                </div>`;
            
            // Calcolo punti live
            const find = (n) => standings.find(t => n.toUpperCase().includes(t.name.substring(0,8)));
            const t1 = find(m.h), t2 = find(m.a);
            if (t1 && t2) {
                t1.sv += m.s1; t1.sp += m.s2; t2.sv += m.s2; t2.sp += m.s1;
                if (m.s1 === 3 && m.s2 <= 1) { t1.pts += 3; t1.v += 1; }
                else if (m.s2 === 3 && m.s1 <= 1) { t2.pts += 3; t2.v += 1; }
                else if (m.s1 === 3 && m.s2 === 2) { t1.pts += 2; t1.v += 1; t2.pts += 1; }
                else if (m.s2 === 3 && m.s1 === 2) { t2.pts += 2; t2.v += 1; t1.pts += 1; }
            }
        });
    }

    standings.sort((a,b) => b.pts - a.pts || b.v - a.v || (b.sv/b.sp) - (a.sv/a.sp));
    
    const tbody = document.getElementById('standings-body');
    tbody.innerHTML = standings.map((t, i) => `
        <tr class="${t.name.includes("GPS") ? 'gps' : ''}">
            <td>${i+1}</td>
            <td style="text-align:left">${t.name}</td>
            <td><b>${t.pts}</b></td>
            <td>${t.v}</td>
            <td>${t.sv}/${t.sp}</td>
        </tr>`).join('');
}

update();
setInterval(update, 30000);
</script>
</body>
</html>
