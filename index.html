<!DOCTYPE html>
<html lang='it'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>GPS Volley Group - LIVE</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f3f4f6;margin:0}
header{background:#111827;color:white;padding:18px;text-align:center}
.container{padding:16px}
.card{background:white;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.big{font-size:42px;font-weight:bold}
.green{background:#d1fae5}
.red{background:#fee2e2}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left}
.highlight{background:#dbeafe;font-weight:bold}
.small{font-size:14px;color:#666}
</style>
</head>
<body>

<header>
<h1>🏐 Serie B1 Femminile - Girone C</h1>
<div>Dashboard LIVE GPS Volley Group</div>
</header>

<div class='container'>

<div class='card green' id='gpsCard'>
<div class='small'>Posizione GPS Volley Group</div>
<div class='big' id='gpsPos'>4ª</div>
<div id='update'></div>
</div>

<div class='card'>
<h2>Classifica LIVE</h2>

<table>
<thead>
<tr>
<th>#</th>
<th>Squadra</th>
<th>Punti</th>
<th>SV</th>
<th>SP</th>
<th>PF</th>
<th>PS</th>
</tr>
</thead>
<tbody id='tbody'></tbody>
</table>

</div>
</div>

<script>

let standings = [

{team:"AZIMUT GIORGIONE TV",pts:72,sv:74,sp:14,pf:0,ps:0},

{team:"BANCA ANNIA ADUNA PD",pts:65,sv:71,sp:18,pf:0,ps:0},

{team:"SMAPIU' ARENA VOLLEY VR",pts:56,sv:62,sp:25,pf:0,ps:0},

{team:"OROTIG AREA SPORT PESCHIERA VR",pts:42,sv:54,sp:44,pf:0,ps:0},

{team:"GPS VOLLEY GROUP SCHIO VI",pts:41,sv:51,sp:49,pf:0,ps:0},

{team:"PALLAVOLO PICCO LECCO LC",pts:36,sv:48,sp:46,pf:0,ps:0},

{team:"VOLKSBANK VICENZA VOLLEY VI",pts:35,sv:48,sp:48,pf:0,ps:0},

{team:"CORTINA EXPRESS IMOCO VE",pts:31,sv:40,sp:52,pf:0,ps:0},

{team:"ISUZU CEREA VR",pts:29,sv:39,sp:55,pf:0,ps:0},

{team:"PALLAV. DON FELICE COLLEONI BG",pts:29,sv:38,sp:54,pf:0,ps:0},

{team:"ROTHOBLAAS VOLANO TN",pts:28,sv:37,sp:58,pf:0,ps:0},

{team:"IDRAS TORBOLE CASAGLIA BS",pts:27,sv:39,sp:57,pf:0,ps:0},

{team:"BREMBO VOLLEY TEAM BG",pts:27,sv:32,sp:57,pf:0,ps:0},

{team:"PROMOBALL SANITARS BS",pts:7,sv:15,sp:71,pf:0,ps:0}

];
function render(){

standings.sort((a,b)=>b.pts-a.pts);

const tbody = document.getElementById("tbody");
tbody.innerHTML = "";

standings.forEach((t,i)=>{

const tr = document.createElement("tr");

if(t.team.includes("GPS")){
tr.classList.add("highlight");
}

tr.innerHTML = `
<td>${i+1}</td>
<td>${t.team}</td>
<td>${t.pts}</td>
<td>${t.sv}</td>
<td>${t.sp}</td>
<td>${t.pf}</td>
<td>${t.ps}</td>
`;

tbody.appendChild(tr);

if(t.team.includes("GPS")){

const pos = i+1;

document.getElementById("gpsPos").innerHTML =
(pos===4 ? "🟢 4ª" :
 pos===5 ? "🔴 5ª" :
 pos+"ª");

}
});

document.getElementById("update").innerHTML =
"Ultimo aggiornamento: " +
new Date().toLocaleTimeString("it-IT");

}

async function updateLive(){

try{

const proxy =
"https://api.allorigins.win/raw?url=" +
encodeURIComponent("https://www.federvolley.it/live-score-b1-femminile");

await fetch(proxy);

render();

}catch(e){

render();

}

}

render();
updateLive();
setInterval(updateLive,60000);

</script>

</body>
</html>
