<!DOCTYPE html>
<html lang='it'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>GPS Volley Group - LIVE</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f3f4f6;margin:0}
header{background:#111827;color:white;padding:18px;text-align:center}
.container{padding:16px}
.card{background:white;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.big{font-size:42px;font-weight:bold}
.green{background:#d1fae5}
.red{background:#fee2e2}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left}
.highlight{background:#dbeafe;font-weight:bold}
.small{font-size:14px;color:#666}
</style>
</head>
<body>

<header>
<h1>🏐 Serie B1 Femminile - Girone C</h1>
<div>Dashboard LIVE GPS Volley Group</div>
</header>

<div class='container'>

<div class='card green' id='gpsCard'>
<div class='small'>Posizione GPS Volley Group</div>
<div class='big' id='gpsPos'>4ª</div>
<div id='update'></div>
</div>

<div class='card'>
<h2>Classifica LIVE</h2>

<table>
<thead>
<tr>
<th>#</th>
<th>Squadra</th>
<th>Punti</th>
<th>SV</th>
<th>SP</th>
<th>PF</th>
<th>PS</th>
</tr>
</thead>
<tbody id='tbody'></tbody>
</table>

</div>
</div>

<script>

let standings = [

{team:"AZIMUT GIORGIONE",pts:30,sv:30,sp:5,pf:840,ps:650},

{team:"BANCA ANNIA ADUNA",pts:28,sv:29,sp:7,pf:820,ps:690},

{team:"SMAPIÙ ARENA VOLLEY",pts:25,sv:27,sp:10,pf:810,ps:700},

{team:"GPS VOLLEY GROUP SCHIO",pts:22,sv:25,sp:12,pf:790,ps:720},

{team:"PALLAVOLO PICCO LECCO",pts:17,sv:21,sp:17,pf:760,ps:740},

{team:"IDRAS TORBOLE CASAGLIA",pts:15,sv:20,sp:18,pf:740,ps:735},

{team:"OROTIG AREA SPORT PESCHIERA",pts:13,sv:18,sp:20,pf:720,ps:740},

{team:"ROTHOBLAAS VOLANO",pts:12,sv:18,sp:21,pf:710,ps:745},

{team:"CORTINA EXPRESS IMOCO",pts:11,sv:16,sp:21,pf:700,ps:730},

{team:"VOLKSBANK VICENZA VOLLEY",pts:11,sv:16,sp:22,pf:695,ps:735},

{team:"PALLAV. DON FELICE COLLEONI",pts:10,sv:15,sp:23,pf:680,ps:760},

{team:"BREMBO VOLLEY TEAM",pts:7,sv:12,sp:26,pf:650,ps:790},

{team:"ISUZU CEREA",pts:6,sv:11,sp:27,pf:640,ps:800},

{team:"PROMOBALL SANITARS",pts:3,sv:8,sp:30,pf:600,ps:850}

];

function render(){

standings.sort((a,b)=>b.pts-a.pts);

const tbody = document.getElementById("tbody");
tbody.innerHTML = "";

standings.forEach((t,i)=>{

const tr = document.createElement("tr");

if(t.team.includes("GPS")){
tr.classList.add("highlight");
}

tr.innerHTML = `
<td>${i+1}</td>
<td>${t.team}</td>
<td>${t.pts}</td>
<td>${t.sv}</td>
<td>${t.sp}</td>
<td>${t.pf}</td>
<td>${t.ps}</td>
`;

tbody.appendChild(tr);

if(t.team.includes("GPS")){

const pos = i+1;

document.getElementById("gpsPos").innerHTML =
(pos===4 ? "🟢 4ª" :
 pos===5 ? "🔴 5ª" :
 pos+"ª");

}
});

document.getElementById("update").innerHTML =
"Ultimo aggiornamento: " +
new Date().toLocaleTimeString("it-IT");

}

async function updateLive(){

try{

const proxy =
"https://api.allorigins.win/raw?url=" +
encodeURIComponent("https://www.federvolley.it/live-score-b1-femminile");

await fetch(proxy);

render();

}catch(e){

render();

}

}

render();
updateLive();
setInterval(updateLive,60000);

</script>

</body>
</html>
