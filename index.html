<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS VOLLEY LIVE</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f7fafc; margin: 0; padding: 10px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #status-bar { background: #2d3748; color: #fff; padding: 8px; border-radius: 8px; font-size: 11px; margin-bottom: 15px; text-align: center; }
        .match { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #f1f5f9; border-radius: 8px; margin-bottom: 8px; border-left: 5px solid #48bb78; }
        .team { width: 40%; font-weight: bold; font-size: 0.9rem; }
        .score { width: 20%; text-align: center; font-size: 1.5rem; font-weight: 800; color: #e53e3e; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 10px; background: #edf2f7; }
        td { padding: 10px; border-top: 1px solid #edf2f7; text-align: center; }
        .gps { background: #ebf8ff; font-weight: bold; color: #2b6cb0; }
        .live-tag { background: #fc8181; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="status-bar">Avvio sistema...</div>

<div class="card">
    <h2 style="margin-top:0"><span class="live-tag">LIVE</span> Girone C</h2>
    <div id="live-container">Ricerca partite...</div>
</div>

<div class="card">
    <h2>🏆 Classifica Real-Time</h2>
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr><th>#</th><th style="text-align:left">Squadra</th><th>PT</th><th>V</th><th>SET</th></tr>
            </thead>
            <tbody id="standings-body"></tbody>
        </table>
    </div>
</div>

<script>
const BASE_DATA = [
    { name:"AZIMUT GIORGIONE TV", pts:72, v:24, sv:74, sp:14 },
    { name:"BANCA ANNIA ADUNA PD", pts:65, v:23, sv:71, sp:18 },
    { name:"SMAPIU' ARENA VOLLEY VR", pts:56, v:19, sv:62, sp:25 },
    { name:"OROTIG AREA SPORT PESCHIERA VR", pts:42, v:12, sv:54, sp:44 },
    { name:"GPS VOLLEY GROUP SCHIO VI", pts:41, v:14, sv:51, sp:49 },
    { name:"PALLAVOLO PICCO LECCO LC", pts:36, v:11, sv:48, sp:46 },
    { name:"VOLKSBANK VICENZA VOLLEY VI", pts:35, v:12, sv:48, sp:48 },
    { name:"CORTINA EXPRESS IMOCO VE", pts:31, v:10, sv:40, sp:52 },
    { name:"ISUZU CEREA VR", pts:29, v:10, sv:39, sp:55 },
    { name:"PALLAV. DON FELICE COLLEONI BG", pts:29, v:10, sv:38, sp:54 },
    { name:"ROTHOBLAAS VOLANO TN", pts:28, v:9, sv:37, sp:58 },
    { name:"IDRAS TORBOLE CASAGLIA BS", pts:27, v:10, sv:39, sp:57 },
    { name:"BREMBO VOLLEY TEAM BG", pts:27, v:9, sv:32, sp:57 },
    { name:"PROMOBALL SANITARS BS", pts:7, v:2, sv:15, sp:71 }
];

async function update() {
    const status = document.getElementById('status-bar');
    const liveBox = document.getElementById('live-container');
    
    try {
        status.innerText = "⏳ Accesso al flusso dati Datasport...";
        
        // Questo è il link "dietro le quinte" che alimenta il sito FIPAV per la B1 Femminile
        const feedUrl = "https://gridm.datasport.it/api/v1/matches?tournament_id=85&season_id=2025"; 
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(feedUrl)}&cb=${Date.now()}`;

        const response = await fetch(proxy);
        const data = await response.json();
        
        // I dati arrivano in formato JSON, molto più facile da leggere dell'HTML
        const content = JSON.parse(data.contents);
        const matches = content.data || [];

        let foundMatches = [];

        status.innerText = "🔍 Filtraggio Girone C...";

        matches.forEach(m => {
            // Verifichiamo se una delle squadre nel match è del Girone C (nella nostra lista)
            const hName = m.home_team.name.toUpperCase();
            const aName = m.away_team.name.toUpperCase();
            
            const isOurMatch = BASE_DATA.some(t => 
                hName.includes(t.name.substring(0, 7)) || 
                aName.includes(t.name.substring(0, 7))
            );

            if (isOurMatch) {
                foundMatches.push({
                    h: m.home_team.name,
                    a: m.away_team.name,
                    s1: m.home_score || 0,
                    s2: m.away_score || 0
                });
            }
        });

        renderContent(foundMatches);
        status.style.background = "#48bb78";
        status.innerText = "✅ DATI ORIGINALI AGGIORNATI: " + new Date().toLocaleTimeString();

    } catch (err) {
        console.error(err);
        status.style.background = "#e53e3e";
        status.innerText = "❌ Errore Feed: Il server Datasport non risponde.";
    }
}

function renderContent(matches) {
    const liveBox = document.getElementById('live-container');
    const standingsBody = document.getElementById('standings-body');
    const standings = JSON.parse(JSON.stringify(BASE_DATA));

    if (matches.length > 0) {
        liveBox.innerHTML = "";
        matches.forEach(m => {
            liveBox.innerHTML += `
                <div class="match">
                    <div class="team" style="text-align:right">${m.h}</div>
                    <div class="score">${m.s1}-${m.s2}</div>
                    <div class="team">${m.a}</div>
                </div>`;
            
            const t1 = standings.find(t => m.h.toUpperCase().includes(t.name.substring(0,8)));
            const t2 = standings.find(t => m.a.toUpperCase().includes(t.name.substring(0,8)));
            
            if (t1 && t2) {
                t1.sv += m.s1; t1.sp += m.s2; t2.sv += m.s2; t2.sp += m.s1;
                if (m.s1 === 3 && m.s2 <= 1) { t1.pts += 3; t1.v += 1; }
                else if (m.s2 === 3 && m.s1 <= 1) { t2.pts += 3; t2.v += 1; }
                else if (m.s1 === 3 && m.s2 === 2) { t1.pts += 2; t1.v += 1; t2.pts += 1; }
                else if (m.s2 === 3 && m.s1 === 2) { t2.pts += 2; t2.v += 1; t1.pts += 1; }
            }
        });
    } else {
        liveBox.innerHTML = "<p style='color:#718096; text-align:center;'>Nessuna partita live (o server FIPAV momentaneamente oscurato).</p>";
    }

    standings.sort((a,b) => b.pts - a.pts || b.v - a.v || (b.sv/b.sp) - (a.sv/a.sp));

    standingsBody.innerHTML = standings.map((t, i) => `
        <tr class="${t.name.includes("GPS") ? 'gps' : ''}">
            <td>${i+1}</td>
            <td style="text-align:left">${t.name}</td>
            <td><b>${t.pts}</b></td>
            <td>${t.v}</td>
            <td>${t.sv}/${t.sp}</td>
        </tr>`).join('');
}

update();
setInterval(update, 45000);
</script>
