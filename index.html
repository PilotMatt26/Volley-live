<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GPS Volley Group LIVE</title>

<style>

body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;

</head>

<body>

<header>
    <h1>🏐 Serie B1 Femminile - Girone C</h1>
    <div>Dashboard LIVE GPS Volley Group</div>
</header>

<div class="container">

    <div class="card" id="gpsCard">

        <div class="small">
            Posizione LIVE GPS Volley Group
        </div>

        <div class="big" id="gpsPos">
            --
        </div>

        <div class="small" id="update">
            Attendo dati live...
        </div>

    </div>

    <div class="card">

        <h2>🔥 Partite LIVE</h2>

        <table>

            <thead>
                <tr>
                    <th>Partita</th>
                    <th>Set</th>
                </tr>
            </thead>

            <tbody id="liveMatches">
            </tbody>

        </table>

    </div>

    <div class="card">

        <h2>🏆 Classifica LIVE</h2>

        <table>

            <thead>

                <tr>
                    <th>#</th>
                    <th>Squadra</th>
                    <th>Pt</th>
                    <th>V</th>
                    <th>SV</th>
                    <th>SP</th>
                </tr>

            </thead>

            <tbody id="tbody">
            </tbody>

        </table>

    </div>

</div>

<script>

let liveMatchesData = [];

let standings = [

{ team:"AZIMUT GIORGIONE TV", pts:72, pv:24, sv:74, sp:14 },

{ team:"BANCA ANNIA ADUNA PD", pts:65, pv:23, sv:71, sp:18 },

{ team:"SMAPIU' ARENA VOLLEY VR", pts:56, pv:19, sv:62, sp:25 },

{ team:"OROTIG AREA SPORT PESCHIERA VR", pts:42, pv:12, sv:54, sp:44 },

{ team:"GPS VOLLEY GROUP SCHIO VI", pts:41, pv:14, sv:51, sp:49 },

{ team:"PALLAVOLO PICCO LECCO LC", pts:36, pv:11, sv:48, sp:46 },

{ team:"VOLKSBANK VICENZA VOLLEY VI", pts:35, pv:12, sv:48, sp:48 },

{ team:"CORTINA EXPRESS IMOCO VE", pts:31, pv:10, sv:40, sp:52 },

{ team:"ISUZU CEREA VR", pts:29, pv:10, sv:39, sp:55 },

{ team:"PALLAV. DON FELICE COLLEONI BG", pts:29, pv:10, sv:38, sp:54 },

{ team:"ROTHOBLAAS VOLANO TN", pts:28, pv:9, sv:37, sp:58 },

{ team:"IDRAS TORBOLE CASAGLIA BS", pts:27, pv:10, sv:39, sp:57 },

{ team:"BREMBO VOLLEY TEAM BG", pts:27, pv:9, sv:32, sp:57 },

{ team:"PROMOBALL SANITARS BS", pts:7, pv:2, sv:15, sp:71 }

];

function render(){

    standings.sort((a,b)=>{

        if(b.pts !== a.pts)
            return b.pts - a.pts;

        if(b.pv !== a.pv)
            return b.pv - a.pv;

        return (b.sv/b.sp) - (a.sv/a.sp);

    });

    const tbody =
        document.getElementById("tbody");

    tbody.innerHTML = "";

    standings.forEach((t,i)=>{

        const tr =
            document.createElement("tr");

        if(t.team.includes("GPS"))
            tr.classList.add("highlight");

        tr.innerHTML = `

            <td>${i+1}</td>

            <td>${t.team}</td>

            <td><b>${t.pts}</b></td>

            <td>${t.pv}</td>

            <td>${t.sv}</td>

            <td>${t.sp}</td>

        `;

        tbody.appendChild(tr);

        if(t.team.includes("GPS")){

            const pos = i+1;

            document.getElementById("gpsPos")
                .innerHTML = pos + "ª";

            const card =
                document.getElementById("gpsCard");

            if(pos === 4){

                card.className = "card green";

            }else{

                card.className = "card red";

            }

        }

    });

    document.getElementById("update")
        .innerHTML =
        "Ultimo aggiornamento: "
        + new Date().toLocaleTimeString("it-IT");

}

function renderLiveMatches(){

    const tbody =
        document.getElementById("liveMatches");

    tbody.innerHTML = "";

    liveMatchesData.forEach(match=>{

        const tr =
            document.createElement("tr");

        tr.innerHTML = `

            <td>

                ${match.home}

                <br>

                ${match.away}

            </td>

            <td class="live-score">

                ${match.s1} - ${match.s2}

            </td>

        `;

        tbody.appendChild(tr);

    });

}

async function updateLive(){

    try{

        const proxy =
        "https://api.allorigins.win/raw?url="
        + encodeURIComponent(
        "https://www.federvolley.it/live-score-b1-femminile"
        );

        const response =
            await fetch(proxy);

        const html =
            await response.text();

        /*
        =====================================
        PRENDE SOLO GIRONE C
        =====================================
        */

        const gironeC =
            html.split("Girone C")[1];

        if(!gironeC){

            render();
            return;

        }

        /*
        =====================================
        REGEX PARTITE LIVE
        =====================================
        */

        const regex =
        /([A-ZÀ-Ú0-9\s\.\'\-]+)\s+(\d)\s*-\s*(\d)\s+([A-ZÀ-Ú0-9\s\.\'\-]+)/g;

        const matches =
            [...gironeC.matchAll(regex)];

        /*
        =====================================
        RESET LIVE
        =====================================
        */

        standings.forEach(t=>{

            t.livePts = t.pts;
            t.livePV = t.pv;
            t.liveSV = t.sv;
            t.liveSP = t.sp;

        });

        liveMatchesData = [];

        /*
        =====================================
        ELABORA MATCH LIVE
        =====================================
        */

        matches.forEach(m=>{

            let home = m[1].trim();

            let s1 = parseInt(m[2]);

            let s2 = parseInt(m[3]);

            let away = m[4].trim();

            /*
            ============================
            CERCA SQUADRE
            ============================
            */

            let t1 =
            standings.find(s =>
                home.includes(
                    s.team.substring(0,12)
                )
            );

            let t2 =
            standings.find(s =>
                away.includes(
                    s.team.substring(0,12)
                )
            );

            /*
            ============================
            AGGIUNGI MATCH LIVE UI
            ============================
            */

            liveMatchesData.push({

                home:home,
                away:away,
                s1:s1,
                s2:s2

            });

            if(!t1 || !t2)
                return;

            /*
            ============================
            SET LIVE
            ============================
            */

            t1.liveSV += s1;
            t1.liveSP += s2;

            t2.liveSV += s2;
            t2.liveSP += s1;

            /*
            ============================
            PUNTI FIPAV
            ============================
            */

            // Vittoria 3-0 o 3-1

            if(s1 === 3 && s2 <= 1){

                t1.livePts += 3;
                t1.livePV += 1;

            }

            else if(s2 === 3 && s1 <= 1){

                t2.livePts += 3;
                t2.livePV += 1;

            }

            // Vittoria 3-2

            else if(s1 === 3 && s2 === 2){

                t1.livePts += 2;
                t1.livePV += 1;

                t2.livePts += 1;

            }

            else if(s2 === 3 && s1 === 2){

                t2.livePts += 2;
                t2.livePV += 1;

                t1.livePts += 1;

            }

        });

        /*
        =====================================
        APPLICA DATI LIVE
        =====================================
        */

        standings.forEach(t=>{

            t.pts = t.livePts;
            t.pv = t.livePV;
            t.sv = t.liveSV;
            t.sp = t.liveSP;

        });

        /*
        =====================================
        ORDINAMENTO FIPAV
        =====================================
        */

        standings.sort((a,b)=>{

            // Punti

            if(b.pts !== a.pts)
                return b.pts - a.pts;

            // Vittorie

            if(b.pv !== a.pv)
                return b.pv - a.pv;

            // Quoziente set

            let qsa = a.sv / a.sp;
            let qsb = b.sv / b.sp;

            if(qsb !== qsa)
                return qsb - qsa;

            return 0;

        });

        render();

        renderLiveMatches();

    }catch(e){

        console.log("Errore LIVE:",e);

        render();

    }

}

render();

updateLive();

setInterval(updateLive,60000);

</script>

</body>
</html>
